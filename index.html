<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostalkut - Perfil de Usuário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <h1 class="logo">nostalkut</h1>
            <nav><span>Início</span> | <span>Perfil</span> | <span>Comunidades</span></nav>
        </div>
    </header>

    <main class="profile-container">
        <aside class="left-column">
            <div class="profile-box">
                <img src="https://via.placeholder.com/150" alt="Foto de Perfil" class="profile-pic">
                <h2>Nome do Usuário</h2>
                <p>Masculino, Solteiro</p>
                <p>Brasil</p>
            </div>
        </aside>

        <section class="main-content">
            <div class="status-box">
                <h3>Sorte de hoje: "Quem cedo madruga, passa o dia com sono."</h3>
            </div>
            <div class="info-box">
                <h3>Recados (Scraps)</h3>
                <div class="scrap">
                    <strong>Amigo 1:</strong> "Passando para deixar um oizinho! Add ai!"
                </div>
            </div>
        </section>
    </main>
</body>
</html>
